app:
  name: mexc-volume-farmer-5m
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# Volume-farming profile: goal = turnover, not PnL.
# Philosophy: many small maker-only round trips at break-even.
# Capital preservation via hard daily loss cap + 3-consecutive-loss pause + tight stops.

exchange:
  name: mexc_futures
  base_url_rest: https://contract.mexc.com
  base_url_ws: wss://contract.mexc.com/edge
  symbol: BTC_USDT
  timeframe: 5m
  tick_size: 0.1
  recv_window_ms: 5000
  request_timeout_seconds: 15
  heartbeat_timeout_seconds: 30
  rate_limits:
    requests_per_second: 10
    burst_capacity: 20

fees:
  maker: 0.0001
  taker: 0.0005

strategy:
  name: bollinger_mean_reversion
  require_extreme_zone: false
  bollinger:
    period: 20
    std_dev: 1.5              # tight bands = many touches
  rsi:
    period: 14
    oversold: 40              # loose: any mild dip
    overbought: 60
    require_crossback: false
    crossback_min_delta: 0.0
  ema:
    period: 200
    slope_lookback_candles: 20
    slope_min: -1.0           # essentially disabled
    side_bias_max_atr_distance: 50.0  # essentially disabled
  atr:
    period: 14
    stop_multiple: 0.5        # tight stop: small capital risk per trade
  volatility_filter:
    min_bandwidth_pct: 0.0005
    max_bandwidth_pct: 0.10
  volume_filter:
    enabled: false
  confirmation:
    require_next_candle_close_confirmation: false
    min_body_fraction: 0.0
  exits:
    take_profit_at_middle_band: true
    time_stop_candles: 4      # 20 min exit no matter what
    partial_tp:
      enabled: true
      tp1_fraction_to_mid: 0.20   # fast: bank tiny TP near entry
      tp1_size_fraction: 0.7      # close most of position early
      tp2_fraction_to_mid: 0.50
      tp2_size_fraction: 0.2
      move_stop_to_breakeven: true
  signal_quality:
    min_rr_ratio: 0.6          # loose — we aren't chasing edge
    min_fee_cover_multiple: 2.5  # must cover 2.5× round-trip fees = ~0.05% minimum move

# -------- CAPITAL-PRESERVATION RAILS (aggressive) --------
risk:
  risk_per_trade_pct: 0.01       # 1% risk per trade: with $100 = $1 risk/trade
  max_open_positions: 1
  daily_drawdown_limit_pct: 0.02 # HARD STOP: halt for the day after 2% drawdown
  consecutive_losses_limit: 3    # pause after 3 losers in a row
  consecutive_losses_pause_hours: 1
  max_leverage: 10               # allow up to 10x so tight stops produce real notional
  max_spread_pct: 0.0008
  cooldown_bars_after_stop: 3    # brief cool-off after a stop
  emergency_market_exit_enabled: true
  startup_checks:
    require_futures_trade_permission: true
    require_withdrawal_disabled: true

execution:
  entry_order_type: limit
  entry_time_in_force: post_only   # MAKER ONLY — essential for fee economics
  cancel_on_miss: true
  allow_market_orders_for_emergency_exit_only: true
  slippage:
    base_ticks_per_fill: 1
    extra_ticks_if_low_volume: 1
    low_volume_threshold_ratio: 0.5
  maker_fill_model:
    enabled: true
    base_fill_probability: 0.65
    max_fill_probability: 0.98
    min_fill_probability: 0.10

backtest:
  start_lookback_months: 12
  initial_equity: 100.0         # realistic sim: $100 capital
  average_volume_lookback: 50
  enforce_single_position: true
  use_realistic_fills: true
  include_fees: true
  include_slippage: true
  stress_test:
    enabled: true
    win_rate_drop_percentage_points: 5

storage:
  historical_data_dir: data/historical
  sqlite_path: data/bot_audit_volume.db
  parquet_compression: snappy

notifications:
  telegram:
    enabled: true
    bot_token_env: TELEGRAM_BOT_TOKEN
    chat_id_env: TELEGRAM_CHAT_ID
    send_signals: false          # too noisy — silence per-trade pings
    send_entries: false
    send_partials: false
    send_exits: false
    send_errors: true
    daily_report_hour: 0         # ONLY daily digest

reporting:
  output_dir: data/reports
  create_html: true
  create_markdown: true
  include_monthly_returns: true
  include_trades_per_day_distribution: true
  include_win_rate_by_month: true
  include_equity_vs_btc_overlay: true
  include_winner_loser_distribution: true
