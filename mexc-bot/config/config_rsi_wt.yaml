app:
  name: mexc-rsi-wt-5m
  environment: development
  timezone: Asia/Colombo
  log_level: INFO
exchange:
  name: mexc_futures
  base_url_rest: https://contract.mexc.com
  base_url_ws: wss://contract.mexc.com/edge
  symbol: BTC_USDT
  timeframe: 5m
  tick_size: 0.1
  recv_window_ms: 5000
  request_timeout_seconds: 15
  heartbeat_timeout_seconds: 30
  rate_limits:
    requests_per_second: 10
    burst_capacity: 20
fees:
  maker: 0.0001
  taker: 0.0005
strategy:
  name: rsi_wt
  rsi:
    period: 14
    upper: 70.0
    lower: 30.0
  wavetrend:
    channel_len: 9
    average_len: 12
    signal_len: 3
    oversold: -53.0
    overbought: 53.0
    oversold_deep: -75.0
  require_wt_confirmation: false
  wt_confluence_lookback: 3
  atr_period: 14
  atr_stop_multiple: 1.5
  exits:
    min_rr_ratio: 2.0
    time_stop_candles: 24
  min_fee_cover_multiple: 3.0
  require_confirmation: false
risk:
  risk_per_trade_pct: 0.02
  max_open_positions: 1
  daily_drawdown_limit_pct: 0.05
  consecutive_losses_limit: 5
  consecutive_losses_pause_hours: 2
  max_leverage: 10
  max_spread_pct: 0.0005
  cooldown_bars_after_stop: 6
  emergency_market_exit_enabled: true
  startup_checks:
    require_futures_trade_permission: true
    require_withdrawal_disabled: true
execution:
  entry_order_type: limit
  entry_time_in_force: post_only
  cancel_on_miss: true
  allow_market_orders_for_emergency_exit_only: true
  slippage:
    base_ticks_per_fill: 1
    extra_ticks_if_low_volume: 1
    low_volume_threshold_ratio: 0.5
  maker_fill_model:
    enabled: true
    base_fill_probability: 0.65
    max_fill_probability: 0.98
    min_fill_probability: 0.1
backtest:
  start_lookback_months: 12
  initial_equity: 10000.0
  average_volume_lookback: 50
  enforce_single_position: true
  use_realistic_fills: true
  include_fees: true
  include_slippage: true
  stress_test:
    enabled: true
    win_rate_drop_percentage_points: 5
storage:
  historical_data_dir: data/historical
  sqlite_path: data/bot_audit_rsi_wt.db
  parquet_compression: snappy
notifications:
  telegram:
    enabled: true
    bot_token_env: TELEGRAM_BOT_TOKEN
    chat_id_env: TELEGRAM_CHAT_ID
    send_signals: true
    send_entries: true
    send_partials: false
    send_exits: true
    send_errors: true
    daily_report_hour: 0
reporting:
  output_dir: data/reports
  create_html: true
  create_markdown: true
  include_monthly_returns: true
  include_trades_per_day_distribution: true
  include_win_rate_by_month: true
  include_equity_vs_btc_overlay: true
  include_winner_loser_distribution: true
