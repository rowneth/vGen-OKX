app:
  name: volume-farmer-bb-tuned
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# VOLUME FARMER — Tuned Bollinger-Fade + Dynamic Leverage.
#
# Goal: $100 -> $1M volume, survive via dynamic sizing (ebirth.net formula).
# Accept PnL bleed; 70% fee rebate ($210 back on $300 gross) makes it net profitable.
#
# Key math at start:
#   margin = 5% of $100 = $5
#   risk   = 2.5% of $100 = $2.50
#   SL     = 10 bps = 0.10%
#   leverage = $2.50 / ($5 * 0.001) = 500 -> capped at 125x
#   notional = $5 * 125 = $625 per side, $1,250 round-trip volume
#   trips to $1M = 800  |  fee/trip = $0.375 gross, $0.1125 net
#   total net fee cost = $90  |  rebate earned = $210
#
# As equity drops, margin shrinks, leverage auto-adjusts, risk stays 2.5%.

exchange:
  symbol: BTC_USDT
  timeframe: 5m

fees:
  maker: 0.0001
  taker: 0.0005
  rebate_pct: 0.70

farmer:
  capital_usd: 100.0
  # Fixed leverage disabled — dynamic sizing takes over
  leverage: 0                      # 0 = use dynamic calculator

  # Position sizing (ebirth.net formula: lev = risk / (margin * SL%))
  margin_fraction_per_trade: 0.05  # 5% of equity as margin
  sizing:
    dynamic_leverage: true
    risk_per_trade_pct: 0.025      # 2.5% of equity at risk per trade
    max_leverage: 125              # MEXC BTC futures cap
    min_leverage: 5                # floor to keep notional meaningful

  # Bracket: asymmetric — TP > SL so at 50% WR you net positive PnL
  tp_bps: 15.0                     # 0.15% TP = $0.9375 on $625 notional
  sl_bps: 10.0                     # 0.10% SL = $0.625 on $625 notional
  max_hold_bars: 3                 # 15 min max — mean-reversion is fast

  # Entry: Bollinger-fade (defensible directional thesis)
  entry:
    mode: bollinger_fade
    min_bar_range_bps: 0.0
    max_bar_range_bps: 10000.0
    rsi:
      period: 14
    bollinger:
      period: 20
      std_dev: 2.0
      rsi_long_max: 40.0           # relaxed from 35 — more signals
      rsi_short_min: 60.0          # relaxed from 65 — more signals
      width_min_bps: 15.0          # slightly looser squeeze gate
      width_max_bps: 300.0         # allow wider volatility bands
      ema_trend_filter: false      # no trend filter — max frequency
      ema_trend_len: 200

  alternate_direction: false       # respect signal direction

# SURVIVAL-focused risk rails — let it grind through drawdowns
risk:
  daily_loss_limit_pct: 0.50       # very lenient — 50%/day before halt
  max_drawdown_pct: 0.95           # allow 95% DD — account can go to $5
  consecutive_losses_limit: 10     # 10 losers before cooldown
  consecutive_losses_cooldown_bars: 12  # 1h cooldown then resume
  stop_on_volume_target: true

target:
  volume_usd: 1000000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true
    send_errors: true
    send_milestones: true
    daily_report_hour: 0

reporting:
  output_dir: data/reports
