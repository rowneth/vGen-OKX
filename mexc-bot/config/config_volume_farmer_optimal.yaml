app:
  name: volume-farmer-optimal
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# OPTIMAL VOLUME FARMER — $300 -> $1M target.
#
# Sweep winner: micro_momentum, TP=5bps / SL=50bps, no time-stop.
# Asymmetric bracket: wins are tiny, losses are rare but large -> ~90% WR.
# Dynamic leverage (ebirth.net formula) keeps risk at 2.5% of equity per trade.
#
# Expected month-end on BTC 5m (scaled linearly from $100 sim):
#   Volume:     ~$1,000,000 (target hit)
#   Trades:     ~3,000
#   WR:         ~90%
#   End equity: ~$200
#   Rebate:     ~$83 (70% of $119 gross fees)
#   Total:      ~$283 account + rebate
#   Commission: ~$280 (KOL side, 70% of 0.04%)
#   Sub fee:    +$50
#   TOTAL income approx: $330 - $100 expected bleed = ~$230 net/month

exchange:
  symbol: BTC_USDT
  timeframe: 5m

fees:
  maker: 0.0001                    # 1 bps — TP exits
  taker: 0.0005                    # 5 bps — SL exits + market opens
  rebate_pct: 0.70

farmer:
  capital_usd: 300.0               # scaled up 3x from $100
  leverage: 0                      # 0 = dynamic

  margin_fraction_per_trade: 0.05  # 5% of equity as margin
  sizing:
    dynamic_leverage: true
    risk_per_trade_pct: 0.025      # 2.5% risk per trade
    max_leverage: 125
    min_leverage: 5

  # Winning bracket from sweep: tiny TP, wide SL -> 90% WR
  tp_bps: 5.0                      # 0.05% TP (maker exit, cheap)
  sl_bps: 50.0                     # 0.50% SL (taker exit, rare)
  max_hold_bars: 999               # no time-stop — let TP/SL resolve

  # Winning entry: micro-momentum + alternation (simplest, highest volume)
  entry:
    mode: micro_momentum
    min_bar_range_bps: 4.0         # skip dead bars
    max_bar_range_bps: 40.0        # skip violent bars (widens if SL is 50bps)

  alternate_direction: true        # flip bias to keep net exposure near 0

# Survival rails — allow heavy DD because rebate recovers it
risk:
  daily_loss_limit_pct: 0.50       # 50% per day — very lenient
  max_drawdown_pct: 0.95           # 95% absolute DD halt
  consecutive_losses_limit: 10
  consecutive_losses_cooldown_bars: 12
  stop_on_volume_target: true

target:
  volume_usd: 1000000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true
    send_errors: true
    send_milestones: true
    daily_report_hour: 0

reporting:
  output_dir: data/reports
