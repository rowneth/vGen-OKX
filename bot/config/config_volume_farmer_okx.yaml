app:
  name: volume-farmer-okx
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# OKX VOLUME FARMER — Fix5 optimal config.
#
# REAL FEE STRUCTURE (OKX perpetuals, regular tier):
#   Maker (POST_ONLY open):  0.020%  (0.0002)
#   Taker (SL/trend-break):  0.050%  (0.0005)
#   Limit-TP (maker fill):   0.020%  (0.0002)
#   Rebate:                  40% of maker fee earned
#
# Fix5 backtest result (BTC 5m, full history):
#   WR 73.5% | High-vol-only filter (ATR ≥ p67 = $167.6)
#   ATR-relative TP = 0.5×ATR_bps, SL = 1.5×ATR_bps
#   Limit-TP enabled: 99.9% maker fill rate confirmed
#   No alternation, no trend-break
#
# NOTE: 73.5% WR < 80.4% break-even WR at 40% rebate.
# Strategy is volume/rebate driven — negotiate higher rebate tier to close gap.

exchange:
  symbol: BTC_USDT
  timeframe: 5m

fees:
  maker: 0.0002                    # 0.020% OKX maker
  taker: 0.0005                    # 0.050% OKX taker
  rebate_pct: 0.40                 # 40% rebate on maker fees

farmer:
  capital_usd: 500.0
  leverage: 0                      # 0 = dynamic

  margin_fraction_per_trade: 0.03  # 3% of equity as margin
  sizing:
    dynamic_leverage: true
    risk_per_trade_pct: 0.025      # 2.5% risk per trade
    max_leverage: 125
    min_leverage: 5

  # Fallback fixed TP/SL (used when atr.relative = false)
  tp_bps: 8.0
  sl_bps: 50.0
  max_hold_bars: 999               # no time-stop — let TP/SL resolve

  entry:
    mode: micro_momentum
    min_bar_range_bps: 3.0         # skip dead bars
    max_bar_range_bps: 40.0        # skip violent bars

  alternate_direction: false       # no alternation: pure momentum signal

  # Limit TP: place TP as a limit order on OKX → maker fill (0.020%)
  limit_tp: true

  # ATR-relative TP/SL + high-vol session filter
  atr:
    period: 14                     # Wilder ATR-14
    relative: true                 # use ATR-relative bracket
    tp_mult: 0.5                   # TP = 0.5 × ATR_bps
    sl_mult: 1.5                   # SL = 1.5 × ATR_bps
    tp_bps_min: 5.0                # floor: at least 5 bps TP
    sl_bps_min: 8.0                # floor: at least 8 bps SL
    min_usd: 120.0                 # skip when ATR < $120 (recalibrated Jun 2026; current ATR ~$146)

  # Trend-break disabled — ATR-relative SL already sizes appropriately
  trend_break:
    enabled: false
    min_bars_held: 3
    adverse_bps: 20.0

# Survival rails
risk:
  daily_loss_limit_pct: 0.50       # 50% per day — very lenient (rebate recovers)
  max_drawdown_pct: 0.95           # 95% absolute DD halt
  consecutive_losses_limit: 10
  consecutive_losses_cooldown_bars: 12
  stop_on_volume_target: true

target:
  volume_usd: 5000000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true
    send_errors: true
    send_milestones: true
    daily_report_hour: 0

reporting:
  output_dir: data/reports
