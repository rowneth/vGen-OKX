app:
  name: volume-farmer-okx-v3
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# OKX VOLUME FARMER — v3 "5M campaign" config.
#
# Goal: 5,000,000 USDT counted volume within 30 days (reward 1,500 USDT),
# at the all-maker net cost floor (~$120-130 per 1M after the 40% rebate).
#
# v2 → v3 changes (from the 2026-06 full audit):
#   THROUGHPUT (the binding constraint — v2 ceiling was ~$3.2M/month):
#   1. reentry_same_bar: a close at bar N can re-enter on bar N — the minimum
#      cycle drops from 2 bars to 1 (volume ceiling doubles).
#   2. Session loss-streak cooldown now counts ONLY real SL hits
#      (consecutive_losses_count_reasons) — time-stop scratches no longer
#      trigger 1h entry pauses (this was the single biggest self-inflicted
#      volume loss in live data).
#   3. atr.min_usd: 0 — quiet regimes are the CHEAPEST to farm (tiny drift,
#      easy maker fills); the old $120 gate blanked out whole days.
#   4. skip_hours removed: -12.5% volume for ~0.7bps/trade was a bad trade
#      against a hard monthly target.
#   5. min_bar_range_bps 3.0 → 1.0: dead bars produce cheap maker scratches.
#   6. working_capital_usd is EXPLICIT (v2 omitted it and silently sized off
#      the full wallet); margin_fraction 0.025 → 0.04.
#   7. pace: the controller scales margin per trade to converge on the
#      target by day 30 (bounded 0.02..0.08).
#   COST (already near the floor — keep it there):
#   8. maker_exit.ladder_start_frac 0.5: first exit peg starts mid-ladder —
#      fills sooner for a fraction of the spread (drift while waiting at the
#      passive touch costs more than the spread given up).
#   9. entry_repeg.use_amend: re-price via amend-order (1 REST call, no naked
#      window) instead of cancel+replace.
#  10. entry_repeg.max_chase_bps 10: stop chasing a runaway touch — the TP/SL
#      bracket is anchored to the signal, so a long chase skews it.
#  11. tp_bps_max 25 → 18 (backtest: reachability collapses past ~18bps under
#      the 1-bar time stop; the old 25 contradicted its own comment).
#  12. rebate_all_legs: true — the campaign rebates 40% of ALL fees (maker
#      AND taker), per the program terms.
#
# IMPORTANT — DEMO FIRST. Run with --demo until a full day looks clean.

exchange:
  symbol: BTC_USDT                 # PRIMARY — checked first every bar
  timeframe: 5m
  # Secondary instruments fill the primary's quiet gaps. ONE position at a
  # time account-wide (executors share a global gate; primary has a 3s poll
  # head-start on shared bar boundaries). Joint backtest 2026-06-11 (60d):
  # BTC+DOGE @ gate 0.7 → $846k/day at $182.8/1M vs BTC-only $898k at $186.7.
  secondary_symbols:
    - symbol: DOGE_USDT
      overrides:
        tp_mult: 0.5               # DOGE ATR runs ~23bps; 0.5x lands mid-band
        max_bar_range_bps: 80.0    # DOGE bars are bigger; 40 would gate most
        alternate_direction: false # DOGE direction carries real signal: keep
                                   # momentum (mom beats forced-alt both halves)

fees:
  # CORRECTED 2026-06-11 from the live startup fee-tier check: OKX charges this
  # account the FULL standard rates (2.0/5.0 bps) — the negotiated "20% off" is
  # NOT an account-level tier cut, so gross fees MUST be the real rates here or
  # the TP fee-floor and cost model are wrong. The "20% off" + "20% rebate" are
  # external cashback (come back separately); rebate_pct models only the
  # portion we actually recover. Set to 0.20 (the explicit rebate) — CONSERVATIVE:
  # if the 20%-off is also cashed back (40% total), bump this to 0.40 so the
  # cost display and the recycle-ask amounts are exact. Net at 20%: ~$160/1M;
  # at 40%: ~$126/1M.
  maker: 0.0002                    # 0.020% — full rate CHARGED at execution (verified
  taker: 0.0005                    # 0.050%   from real fills: $0.269194 / $1345.97 = 2.0bps)
  # rebate_pct = TOTAL fraction of paid fees returned to you (any source).
  # User-stated 2026-06-13: rebate is 20% (the "20% off on fees" is a SEPARATE
  # credit — if it ALSO returns as cash, true recovery is 40% and this should
  # be 0.40). 0.20 is the CONSERVATIVE setting: under-stating recovery only
  # makes the TP floor safer (8.4bps) and the cost display honest, whereas
  # over-stating it would book tiny-loss TPs as wins. Net cost ~$160/1M @20%.
  rebate_pct: 0.20
  rebate_all_legs: true            # the 20% applies to maker AND taker legs

farmer:
  capital_usd: 500.0               # sim equity (paper bookkeeping view)
  working_capital_usd: 1500.0      # live sizing base cap: min(wallet, this)
  leverage: 0                      # 0 = dynamic

  # Leverage is NOT a risk/return knob here — risk = notional × move, and
  # notional = base × margin_fraction × leverage. 15× with a doubled margin
  # fraction gives the SAME $1,800/leg as the old 30×/0.04, but pushes
  # isolated-margin liquidation from ~2.8% to ~6.2% away — permanently beyond
  # the 6×ATR disaster stop (which can reach ~210bps in normal vol, worse in
  # spikes). Locked margin rises $60 → $120/trade: irrelevant at one position.
  margin_fraction_per_trade: 0.08  # base; the pace controller scales it
  sizing:
    dynamic_leverage: true         # formula always exceeds the cap → cap binds
    risk_per_trade_pct: 0.025
    max_leverage: 15               # liq ~620bps vs ≤210bps SL: 3x headroom
    min_leverage: 5

  # Campaign pace controller: margin_fraction is scaled by
  # (required volume/day) / (achieved volume/day), clamped to
  # [min_margin_fraction, max_margin_fraction], after warmup_trips.
  # Smart-middle pacing: target day 20, not day 30 — a 10-day buffer for
  # outages/regime changes before the real deadline. The controller runs the
  # SMALLEST size that holds the 20-day schedule (low daily bleed, small
  # per-trade tail) and only sizes up toward max when actually behind.
  # Total campaign cost is volume-fixed (~$735) either way; what this buys
  # is low burn rate + automatic catch-up, instead of rushing at max size.
  pace:
    enabled: true
    # 25 days is matched to the ~$471 starting wallet: required ≈ $200k/day →
    # ~$42/day gross fee outflow, inside the 10% daily breaker ($47/day) with
    # margin. At a 20-day pace the gross burn (~$52/day) exceeds the breaker
    # and triggers daily pauses. Top the wallet up to $800+ and 20 is safe.
    campaign_days: 25
    min_margin_fraction: 0.04      # $900/leg when ahead of schedule
    max_margin_fraction: 0.20      # $4,500/leg catch-up ceiling (lev stays 15x:
                                   # notional never moves the liquidation line)
    warmup_trips: 10

  # Fallback fixed TP/SL (used when atr.relative = false)
  tp_bps: 8.0
  sl_bps: 50.0
  max_hold_bars: 999               # legacy fallback; superseded by time_stop

  # 1-bar time stop: the data-proven optimum (-3.04 bps/trade vs -4.67 with
  # no stop over 15k+ backtest entries). The primary loser exit.
  time_stop:
    enabled: true
    max_hold_bars: 1
    bar_seconds: 300

  # Maker-first exit ladder for the time-stop close. ladder_start_frac 0.5:
  # first peg starts halfway to the aggressive maker price — for a volume
  # farmer the adverse drift while waiting at the passive touch costs more
  # than the half-spread given up.
  maker_exit:
    enabled: true
    repeg_ms: 750
    max_repegs: 10
    # Tuned from LIVE day-1 data (2026-06-11): 31 of 69 closes were dumped at
    # market — the 15bps adverse trigger + 20s budget bailed to taker far more
    # often than the demo ever did, costing ~3bps extra on 23% of volume. The
    # 9xATR stop sits 100-200bps away, so letting the maker ladder keep
    # working to 25bps / 30s is safe and converts most of those to maker.
    max_exit_seconds: 30.0
    max_adverse_bps: 25.0
    poll_ms: 120
    ladder: true
    ladder_max_frac: 1.0
    ladder_start_frac: 0.5

  # RESTING maker TP. The attached trigger-TP fired a limit only on touch; on
  # a gap that limit was already marketable and filled TAKER — live data showed
  # ~47% of TP WINS leaking taker. With this on, the entry attaches only the
  # market SL and a reduce-only POST_ONLY limit is rested at tp_px the instant
  # the entry fills, so wins fill MAKER by construction. Backtested 2026-06-14:
  # TP-taker 47%->0%, fill-rate only -2-3%, ~$7-18/1M saved; net@5M +$36-89.
  resting_tp:
    enabled: true

  # Entry re-peg chase. taker_fallback stays ON: a missed entry forfeits
  # 2x notional of counted volume; the taker leg still nets positive against
  # the bounty (≈$300/1M) and rebates 40% too. max_chase_bps bounds the
  # TP/SL-bracket skew of a long chase; use_amend halves re-peg round trips.
  entry_repeg:
    enabled: true
    repeg_ms: 8000
    max_repegs: 6
    max_entry_seconds: 60.0
    poll_ms: 150
    taker_fallback: true
    max_chase_bps: 10.0
    use_amend: true

  entry:
    mode: micro_momentum
    min_bar_range_bps: 1.0         # dead bars = cheap maker scratches; farm them
    max_bar_range_bps: 40.0        # keep: adverse selection in violent bars
    # Relative volume gate: skip bars trading under 0.7x the 50-bar median
    # volume. Backtested: thin bars have the worst maker fills/spreads; with
    # DOGE as secondary the skipped BTC bars are reused, net +$16 campaign.
    min_vol_ratio: 0.7
    skip_hours: []                 # volume target beats the ~0.7bps/t saving

  # Re-enter on the same bar a position closed (cycle floor 1 bar, not 2).
  reentry_same_bar: true

  # PRIMARY (BTC) trades forced L/S/L alternation — pattern-tested 2026-06-11
  # on 60d + both 30d halves, single AND joint book: BTC alternation beats
  # BTC momentum by $6-9/1M consistently (direction-balance cuts the maker
  # entry's adverse-selection drift; BTC's candle direction carries no info).
  # DOGE keeps momentum via its override below — its direction DOES carry
  # signal (mom beats alt by $5-32/1M in both halves). Joint book improves
  # $141.7 -> $135.1/1M (net@5M +$33).
  alternate_direction: true

  limit_tp: true

  atr:
    period: 14
    relative: true
    tp_mult: 1.0                   # sweep-validated 2026-06-10: 0.5–2.0×ATR all
                                   # within $1.3/1M — the fee floor/cap dominate;
                                   # 1.0 is at the optimum
    sl_mult: 9.0                   # sweep: 1.5×ATR = 576 taker SL hits (+$9.5/1M);
                                   # 6× = 3 hits; 9× = ZERO in 60d — the time-stop
                                   # is the real exit, this is a disaster floor
                                   # only (kept, never removed: it also protects
                                   # against bot death mid-hold). At 15× lev the
                                   # 9×ATR stop stays inside the ~617bp liq line.
    tp_bps_min: 6.0
    sl_bps_min: 8.0
    min_usd: 0.0                   # quiet markets are the cheapest volume
    tp_fee_cover_mult: 2.0         # floor = 2.0*2.4 + 2.0 = 6.8bps
    tp_profit_buffer_bps: 2.0
    tp_bps_max: 18.0               # reachability collapses past ~18bps @ 1 bar

  trend_break:
    enabled: false
    min_bars_held: 3
    adverse_bps: 20.0

risk:
  # Session paper halts stay LOOSE on purpose (they exit the process); the
  # real capital protection is the executor's live_breaker_* below.
  daily_loss_limit_pct: 0.50
  max_drawdown_pct: 0.95
  # Breakers retuned to the v3 burn rate (they were sized for the old slow
  # bot). The campaign's PLANNED spend is ~$750 of net fees over 5M volume —
  # ~$130/day at full throughput. On a $2.5-3k wallet the old 5%-daily /
  # 10%-drawdown limits flagged that routine, budgeted bleed as a disaster
  # (daily pauses, then a mid-campaign hard halt around day 2-3). The new
  # values ignore the plan and still catch genuine anomalies: 10%/day ≈ 2x
  # the worst planned day; 40% from peak ≈ a real catastrophe, not budget.
  live_breaker_daily_loss_pct: 0.10    # -10% of day's real wallet -> pause entries
  live_breaker_max_drawdown_pct: 0.40  # -40% from peak -> hard halt
  consecutive_losses_limit: 3
  consecutive_losses_cooldown_bars: 12   # 12 x 5m = 1h
  # ONLY these reasons advance the streak (session AND executor breaker).
  # Time-stop scratches are designed fee-cost exits, not adverse moves.
  consecutive_losses_count_reasons: ["sl", "sl_ambiguous"]
  # Multi-symbol: no single session's SIM counter is authoritative — the
  # runner's target watcher stops the campaign on COMBINED REAL exchange
  # volume (sum of all instruments) instead.
  stop_on_volume_target: false

target:
  volume_usd: 5000000.0
  volume_buffer_pct: 0.02          # halt 2% PAST target: never miss the bounty
                                   # to a session-vs-exchange counting gap
  reward_usd: 1500.0               # shown in journey projections
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true               # now actually implemented (daily digest)
    send_errors: true
    send_milestones: true
    daily_report_hour: 4           # 04:00 UTC = 09:30 Sri Lanka (active hour)
    # Team-mention alerts (rebate recycle / top-up needed) only fire inside
    # this local window so they're not sent — and missed — overnight. Times
    # are in BOT_TIMEZONE (Asia/Colombo). The hourly ops loop holds an
    # overnight-due alert and sends it at the next active hour.
    active_hours:
      start_hour: 8                # 08:00 Sri Lanka
      end_hour: 22                 # 22:00 Sri Lanka
    rebate_reminder:
      enabled: true
      equity_floor_pct: 0.85
      drawdown_pct: 0.08
      min_rebate_usd: 5.0
      cooldown_minutes: 60
      mention_handles:
        - "@rowneth"
        - "@Litchth"
        - "@ChaanaCM"

# DEMO-only execution friction (ignored under --live).
realism:
  enabled: true
  seed: 1337
  entry:
    fill_prob: 0.85
    slip_bps: 0.4
    taker_fee_mult: 2.5
  exit:
    sl_slip_bps: 3.0
    taker_exit_fee_mult: 2.5
    tp_fill_prob: 0.90
    tp_miss_giveback_bps: 6.0

reporting:
  output_dir: data/reports
