app:
  name: volume-farmer-1m
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# 1m VOLUME FARMER — maximises trade count and rebate income.
#
# Same strategy as config_volume_farmer_optimal (micro_momentum, alternate=on)
# but on 1m bars. Backtest 2026-04-28 (25 days):
#   982 trades | WR 76.8% | end+rebate $23.19 | ~39 trades/day
#   vs 5m baseline: 1,037 trades over 360 days (~3 trades/day)
#   → ~14x more rebate income per day.
#
# Trade math at 1m:
#   Each round-trip generates ~$105 notional × 0.01% maker = $0.0105 fee
#   At 70% rebate = $0.0074 back per trade → ~$0.29/day rebate on 39 trades/day
#   vs 5m: ~$0.061/day rebate on 3 trades/day

exchange:
  symbol: BTC_USDT
  timeframe: 1m                    # ← 1m klines (MEXC: Min1)

fees:
  maker: 0.0001                    # 0.01% — confirmed from live trade
  taker: 0.0005                    # 0.05% — TP/SL triggers
  rebate_pct: 0.70

farmer:
  capital_usd: 30.0
  leverage: 0                      # 0 = dynamic

  margin_fraction_per_trade: 0.05
  sizing:
    dynamic_leverage: true
    risk_per_trade_pct: 0.025      # 2.5% risk per trade
    max_leverage: 125
    min_leverage: 5

  tp_bps: 8.0                      # 0.08% TP — minimum viable above fee floor
  sl_bps: 50.0                     # 0.50% SL
  max_hold_bars: 999               # no time-stop

  entry:
    mode: micro_momentum
    min_bar_range_bps: 3.0         # 1m median range is ~2.85bps; 3.0 filters dead bars
    max_bar_range_bps: 40.0        # skip violent bars

  alternate_direction: true        # flip bias per trade

  trend_break:
    enabled: true
    min_bars_held: 3               # give move 3 minutes to resolve
    adverse_bps: 20.0              # exit if 20 bps against entry

# Survival rails
risk:
  daily_loss_limit_pct: 0.50
  max_drawdown_pct: 0.95
  consecutive_losses_limit: 10
  consecutive_losses_cooldown_bars: 12
  stop_on_volume_target: true

target:
  volume_usd: 100000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true
    send_errors: true
    # Dull-market notification: notify after this many consecutive 1m bars
    # without an entry signal (range filter rejecting all bars).
    dull_market_bars: 30          # ~30 minutes flat → first ping
    dull_market_repeat_bars: 60   # then ping every 60 more minutes
