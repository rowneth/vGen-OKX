app:
  name: volume-farmer-paper-sl30tp18-h1veto
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# EXPERIMENTAL: SL=30 / TP=18 + 1h-veto post-filter (paper-only).
#
# Veto rule: block long if 1h close < EMA-20 AND EMA-20 has been falling
# for >=2 consecutive 1h bars. Symmetric for shorts. Otherwise allow.
# Hypothesis: removing trades that fight strong 1h regime improves WR-gap
# without crushing trade frequency. Backtest validates before live.

exchange:
  symbol: BTC_USDT
  timeframe: 5m

fees:
  maker: 0.0001
  taker: 0.0005
  rebate_pct: 0.70

farmer:
  capital_usd: 30.0
  leverage: 0
  margin_fraction_per_trade: 0.05
  sizing:
    dynamic_leverage: true
    risk_per_trade_pct: 0.025
    max_leverage: 125
    min_leverage: 5

  tp_bps: 18.0
  sl_bps: 30.0
  max_hold_bars: 999

  entry:
    mode: micro_momentum
    min_bar_range_bps: 4.0
    max_bar_range_bps: 40.0

  alternate_direction: true

  trend_break:
    enabled: false
    min_bars_held: 3
    adverse_bps: 20.0

  h1_veto:
    enabled: true
    ema_period: 20
    slope_bars: 2
    min_1h_bars: 25

risk:
  daily_loss_limit_pct: 0.50
  max_drawdown_pct: 0.95
  consecutive_losses_limit: 10
  consecutive_losses_cooldown_bars: 12
  stop_on_volume_target: true

target:
  volume_usd: 100000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true
    send_errors: true
    send_milestones: true
    daily_report_hour: 0

reporting:
  output_dir: data/reports
