app:
  name: volume-farmer-paper-sl30tp18
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# PAPER-ONLY experimental config: SL=30 / TP=18.
#
# 12-month backtest grid (best row of entire sweep):
#   WR 64.3%  BE-WR 62.5%  Gap +1.8%   <- only positive-gap row tested
#   Gross P&L +$9.66   Rebate +$26.69   End+Rebate $28.22
#   Trades 900   Volume $127,117
#
# This is the SL=30/TP=15 idea taken one step further \u2014 widening TP keeps
# losses bounded but lets winners run a bit longer.  Trend_break disabled
# for the same reason as the SL=30/TP=15 config (it cuts winners).

exchange:
  symbol: BTC_USDT
  timeframe: 5m

fees:
  maker: 0.0001
  taker: 0.0005
  rebate_pct: 0.70

farmer:
  capital_usd: 30.0
  leverage: 0
  margin_fraction_per_trade: 0.05
  sizing:
    dynamic_leverage: true
    risk_per_trade_pct: 0.025
    max_leverage: 125
    min_leverage: 5

  tp_bps: 18.0
  sl_bps: 30.0
  max_hold_bars: 999

  entry:
    mode: micro_momentum
    min_bar_range_bps: 4.0
    max_bar_range_bps: 40.0

  alternate_direction: true

  trend_break:
    enabled: false
    min_bars_held: 3
    adverse_bps: 20.0

risk:
  daily_loss_limit_pct: 0.50
  max_drawdown_pct: 0.95
  consecutive_losses_limit: 10
  consecutive_losses_cooldown_bars: 12
  stop_on_volume_target: true

target:
  volume_usd: 100000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true
    send_errors: true
    send_milestones: true
    daily_report_hour: 0

reporting:
  output_dir: data/reports
