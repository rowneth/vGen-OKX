app:
  name: volume-farmer-okx-v2
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# OKX VOLUME FARMER — v2 with time-stop + maker-exit re-peg loop.
#
# v1 → v2 changes (from analysis of 133 live trades, total PnL -$80, RR 0.25):
#   1. Time-stop closes the trade after MAX_HOLD_BARS=2 (10 minutes) if the
#      market hasn't already paid us via TP. Slow drifts that used to ride
#      the wide SL band now exit at touch — same volume, much smaller loss.
#   2. Maker-only exit: the time-stop closes through a post_only re-peg loop
#      so it lands at the maker fee (~2bps) instead of the taker market dump
#      (~5bps + overage). Native SL stays as a last-resort taker floor.
#
# IMPORTANT — DEMO FIRST. Set --demo on the runner (or x-simulated-trading
# header on the client) before pointing this at real money.

exchange:
  symbol: BTC_USDT
  timeframe: 5m

fees:
  maker: 0.0002                    # 0.020% OKX maker
  taker: 0.0005                    # 0.050% OKX taker
  rebate_pct: 0.40                 # 40% rebate on maker fees

farmer:
  capital_usd: 500.0
  leverage: 0                      # 0 = dynamic

  margin_fraction_per_trade: 0.025  # 2.5% of equity as margin
  sizing:
    dynamic_leverage: true
    risk_per_trade_pct: 0.025
    # CONTROLLED cap (was 100). Volume farming has no edge, so we size for
    # capital preservation, not throughput: 30x cap + 2.5% margin = ~0.75x wallet
    # notional per trade, keeping the bleed slow. ATR-relative TP/SL (atr.relative
    # true) scale the targets to volatility.
    max_leverage: 30
    min_leverage: 5

  # Fallback fixed TP/SL (used when atr.relative = false)
  tp_bps: 8.0
  sl_bps: 50.0
  # Catastrophic-floor SL stays wide (50bps); the primary exit for losers is
  # now the time-stop below, NOT the price stop.
  max_hold_bars: 999               # legacy fallback; superseded by time_stop block

  # Feature 1 — quick-bar time stop.
  # Hold-horizon backtest (15k+ trades, scripts/analyze_hold_horizon.py): per-trade
  # net is monotonic in hold length — every extra bar loses more. 40% of winners hit
  # TP on bar 1; whatever is still open after that drifts against us. max_hold=1 (5m)
  # is the data-proven optimum (-3.04 vs -3.65 bps/trade at 2 bars).
  time_stop:
    enabled: true
    max_hold_bars: 1               # close non-winners after 1 bar (5m on 5m TF)
    bar_seconds: 300

  # Feature 2 — exit policy on the time-stop path.
  # enabled=false → the time-stop close goes STRAIGHT to a market (taker) order
  # for reliability: it always fills immediately, no re-peg loop that can fail to
  # fill and strand the position. Chosen deliberately over maker exits — the
  # extra taker fee (~+3bps gross on the time-stopped exit leg only; TP winners
  # still fill as maker via limit_tp) is the price of a guaranteed, instant
  # flatten. The retried force-close backstop in the executor covers the rare
  # case where even that market order bounces. Flip back to true to re-enable the
  # maker-first re-peg loop (cheaper fees, but can leave a position open).
  # ENABLED: all-maker exits are the core cost minimizer ($250 -> ~$120 /$1M).
  # The time-stop closes via the laddered maker re-peg loop (passive touch ->
  # aggressive maker price as the order ages), falling back to a RETRIED taker
  # market only as a last resort. The executor's force-close + recovery watcher
  # guarantee the position can never strand open.
  maker_exit:
    enabled: true
    repeg_ms: 750                  # wait per peg before re-pricing
    max_repegs: 8                  # laddered pegs (passive->aggressive) before taker
    max_exit_seconds: 20.0         # hard ceiling, then taker fallback
    max_adverse_bps: 15.0          # market-moved-against trigger -> taker
    poll_ms: 120                   # order-state poll

  # Entry re-peg loop (B). Follows the touch so post_only entries actually
  # fill in trending markets. The single-shot timeout approach left too many
  # entries unfilled when the market trended away from the bar-close price
  # within the 30s timeout window. With re-peg we cancel + replace at the
  # current touch on no-fill, staying at the front of the maker queue.
  # taker_fallback=true means: after 6 re-pegs without a maker fill, send a
  # market order to guarantee the entry. Costs an extra ~1.8bps net (after
  # rebate) on the fallback fills only; preserves volume which is the goal.
  entry_repeg:
    enabled: true
    repeg_ms: 8000                 # 8s per peg — enough to catch a counter-flow take
    max_repegs: 6                  # 6 attempts × 8s = up to 48s of chase
    max_entry_seconds: 60.0        # hard ceiling regardless of attempt count
    poll_ms: 150
    taker_fallback: true           # OKX best-practice for volume-farming entries

  entry:
    mode: micro_momentum
    min_bar_range_bps: 3.0
    max_bar_range_bps: 40.0
    # Skip the worst UTC hours. 360d backtest (scripts/analyze_bad_hours.py):
    # hours 12 & 21 are robustly below-average in both halves (-4 to -4.8 bps);
    # 04 flagged by the live demo-v2 sample. Blocking [4,12,21] drops ~11% of
    # volume (those hours net -3.77 bps vs -3.10 overall) and lifts kept-hours
    # to -3.02 bps/t. NOTE: all 24 hours are net-negative — this trims the worst,
    # it does not create edge. Entry-side directional alpha is the real fix.
    skip_hours: [4, 12, 21]

  alternate_direction: false

  limit_tp: true

  atr:
    period: 14
    relative: true
    # tp_mult 1.0: slightly wider TP fills fewer-but-cheaper as maker.
    # sl_mult 6.0: SL is a CATASTROPHIC floor only — the 1-bar time-stop is the
    # real risk control, so the wide stop stops paying taker on intrabar wicks
    # (drives maker-fill rate to ~100% in backtest, cost -> ~$120/$1M floor).
    tp_mult: 1.0
    sl_mult: 6.0
    # 5bps sat below the 6.2bps robust (maker-open + taker-close) round trip,
    # so a floor-pinned TP could not net-win when a limit TP crossed the spread.
    tp_bps_min: 6.0
    sl_bps_min: 8.0
    min_usd: 120.0
    # Fee-aware achievable TP (see volume_farmer._apply_tp_floor_cap):
    #   round_trip = (maker*(1-rebate))*2*1e4 = (0.0002*0.6)*2*1e4 = 2.4bps  (limit_tp maker close)
    #   floor      = tp_fee_cover_mult*round_trip + tp_profit_buffer_bps
    #              = 2.0*2.4 + 2.0 = 6.8bps
    # A filled TP then nets +4.4bps vs the maker-maker round trip, and stays
    # positive (+0.6bps) even in the maker-open/taker-close worst case.
    # Cap 15bps = backtest best-net; reachability collapses past ~18bps under
    # the 1-bar time stop, so a high-ATR bar can't set an un-hittable TP.
    tp_fee_cover_mult: 2.0
    tp_profit_buffer_bps: 2.0
    tp_bps_max: 25.0

  trend_break:
    enabled: false
    min_bars_held: 3
    adverse_bps: 20.0

risk:
  # Tight, capital-preserving guards (this is a controlled COST, not a profit
  # strategy — the goal is to bleed slowly and never blow up).
  daily_loss_limit_pct: 0.02       # halt entries for the UTC day at -2%
  max_drawdown_pct: 0.10           # HARD halt (manual restart) at -10% from peak
  consecutive_losses_limit: 3      # 3 consecutive losing closes (incl. SL hits)
  consecutive_losses_cooldown_bars: 72   # then pause entries 6h (72 x 5m), auto-resume
  stop_on_volume_target: true

target:
  volume_usd: 5000000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true
    send_errors: true
    send_milestones: true
    daily_report_hour: 0
    rebate_reminder:
      enabled: true
      equity_floor_pct: 0.85
      drawdown_pct: 0.08
      min_rebate_usd: 5.0
      cooldown_minutes: 60
      mention_handles:
        - "@rowneth"
        - "@Litchth"
        - "@ChaanaCM"

reporting:
  output_dir: data/reports
