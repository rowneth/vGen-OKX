app:
  name: volume-farmer-mtf
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# MTF-ONLY EXPERIMENT — identical to config_volume_farmer_optimal.yaml except:
#   - entry.mode: multi_timeframe (3m micro + 15m macro alignment)
#   - alternate_direction: false (MTF alignment replaces forced L/S/L/S)
#   - sl_bps: 50.0 — unchanged (isolates MTF direction change only)
#   - tp_bps: 8.0 — back to baseline (was 15 in old MTF config)
#
# MTF logic: trade when 3m micro-trend and 15m macro-trend agree.
# allow_neutral_micro: true — macro alone is sufficient if micro is flat.
# skip_neutral_macro: true — skip trade when 15m is in chop (most important gate).
#
# Decision rules applied post-backtest (set in advance, do not change):
#   PASS if vs baseline: WR >= 80%, end+rebate >= baseline+10%,
#         DD <= baseline+5pp, trades >= 50% baseline, avg_loss_bps <= 25

exchange:
  symbol: BTC_USDT
  timeframe: 5m

fees:
  maker: 0.0001
  taker: 0.0005
  rebate_pct: 0.70

farmer:
  capital_usd: 30.0
  leverage: 0

  margin_fraction_per_trade: 0.05
  sizing:
    dynamic_leverage: true
    risk_per_trade_pct: 0.025
    max_leverage: 125
    min_leverage: 5

  tp_bps: 8.0
  sl_bps: 50.0           # unchanged
  max_hold_bars: 999

  entry:
    mode: multi_timeframe
    primary_3m_lookback_bars: 5    # micro: last-bar direction + SMA slope on 3m proxy
    macro_15m_lookback_bars: 5     # macro: HH/HL + position-in-range on 15m bars
    require_alignment: true
    allow_neutral_micro: true      # macro alone enough when micro is sideways
    skip_neutral_macro: true       # skip when 15m is choppy (most important gate)
    min_bar_range_bps: 3.0
    max_bar_range_bps: 40.0

  alternate_direction: false       # MTF replaces forced alternation — CHANGED

  trend_break:
    enabled: true
    min_bars_held: 3
    adverse_bps: 20.0              # unchanged

  h1_veto:
    enabled: false                 # rejected experiment — do not enable

risk:
  daily_loss_limit_pct: 0.50
  max_drawdown_pct: 0.95
  consecutive_losses_limit: 10
  consecutive_losses_cooldown_bars: 12
  stop_on_volume_target: true

target:
  volume_usd: 100000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: false
    send_daily: false
    send_errors: false
