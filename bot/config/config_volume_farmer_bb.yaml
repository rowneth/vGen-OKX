app:
  name: volume-farmer-bb
  environment: development
  timezone: Asia/Colombo
  log_level: INFO

# VOLUME FARMER — Bollinger-Fade + RSI mean-reversion variant.
# Goal: 40% fee-cover via higher WR (target 55-60%) at the cost of fewer trades.
# Asymmetric bracket: TP 12 bps / SL 8 bps -> break-even WR ~40%.

exchange:
  symbol: BTC_USDT
  timeframe: 5m

fees:
  maker: 0.0001
  taker: 0.0005
  rebate_pct: 0.70

farmer:
  capital_usd: 100.0
  leverage: 20                     # $60 margin x 20 = $1,200 notional
  margin_fraction_per_trade: 0.6

  # Asymmetric bracket: reward > risk
  tp_bps: 12.0
  sl_bps: 8.0
  max_hold_bars: 3                 # mean-reversion is quick or wrong (15 min)

  entry:
    mode: bollinger_fade
    min_bar_range_bps: 0.0
    max_bar_range_bps: 10000.0
    rsi:
      period: 14
    bollinger:
      period: 20
      std_dev: 2.0
      rsi_long_max: 35.0           # RSI must be < 35 for long fade
      rsi_short_min: 65.0          # RSI must be > 65 for short fade
      width_min_bps: 20.0          # skip squeezed ranges (< 0.20% band width)
      width_max_bps: 200.0         # skip exploded volatility (> 2% band width)
      ema_trend_filter: false      # Phase 1: no trend filter (more signals)
      ema_trend_len: 200

  alternate_direction: false       # respect signal direction

risk:
  daily_loss_limit_pct: 0.20
  max_drawdown_pct: 0.60
  consecutive_losses_limit: 6
  consecutive_losses_cooldown_bars: 24
  stop_on_volume_target: true

target:
  volume_usd: 1000000.0
  min_fee_cover_pct: 0.40

notifications:
  telegram:
    enabled: true
    send_daily: true
    send_errors: true
    send_milestones: true
    daily_report_hour: 0

reporting:
  output_dir: data/reports
